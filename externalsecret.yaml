apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-secret
spec:
  refreshInterval: 1m

  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: payment-secret

  data:
  - secretKey: token
    remoteRef:
      key: payment-token
      property: token